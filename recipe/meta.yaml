{% set name = "dask-glm" %}
{% set version = "0.4.0" %}
{% set sha256 = "96626ad980c5ec4c2db5a406591ce7b3e19762f0785613fde0bfe597d5fc7b17" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/d/dask-glm/dask_glm-0.4.0.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [s390x]

requirements:
  host:
    - python
    - setuptools >=61
    - setuptools_scm
    - pip
    - setuptools-scm >=8
  run:
    - python
    - cloudpickle >=1.0
    - dask
    - multipledispatch >=0.6.0
    - scipy >=1.7
    - scikit-learn >=1.0
    - distributed >=2022.1.0
    - sparse >=0.15
    - dask-core >=2022.1.0
    - numba >=0.59
    - numpy >=1.21

test:
  source_files:
    - dask_glm/tests
  imports:
    - dask_glm
    - dask_glm.estimators
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - pytest dask_glm/tests -v -k "not (test_determinism_distributed or test_broadcast_lbfgs_weight or test_dot_with_sparse)"

about:
  home: https://github.com/dask/dask-glm
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Generalized Linear Models in Dask
  description: |
    Generalized Linear Models for parallel and
    distributed machine learning, built using dask.
  doc_url: https://dask-glm.readthedocs.io
  dev_url: https://github.com/dask/dask-glm

extra:
  recipe-maintainers:
    - TomAugspurger
    - cicdw
